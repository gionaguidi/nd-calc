<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Fleet ND Calc</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ND Calc">
    <style>
        :root {
            --bg-color: #0a0a0c;
            --card-bg: #16161a;
            --accent-color: #007aff;
            --text-color: #ffffff;
            --text-muted: #8e8e93;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: calc(30px + env(safe-area-inset-top)) 20px calc(20px + env(safe-area-inset-bottom)) 20px;
            overflow-x: hidden;
        }
        header {
            margin-bottom: 22px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 6px;
        }
        .brand-logo {
            height: 28px; 
            width: auto;
            object-fit: contain;
        }
        .brand-title {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--text-color);
        }
        .card {
            background-color: var(--card-bg);
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 15px;
        }
        .flex-row {
            display: flex;
            gap: 12px;
        }
        .flex-child {
            flex: 1;
        }
        label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: 600;
        }
        .segmented-control {
            display: flex;
            background-color: #1c1c1e;
            border-radius: 10px;
            padding: 4px;
            gap: 4px;
        }
        .segmented-control button {
            flex: 1;
            background: none;
            border: 2px solid transparent !important;
            color: var(--text-muted);
            padding: 10px 4px;
            font-size: 13px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.15s ease;
            white-space: nowrap;
        }
        .segmented-control button.active {
            background-color: #3a3a3c !important;
            color: var(--text-color) !important;
            border-color: var(--accent-color) !important;
            box-shadow: 0 0 10px rgba(0, 122, 255, 0.4) !important;
        }
        .select-input {
            width: 100%;
            background-color: #1c1c1e;
            color: var(--text-color);
            border: 2px solid transparent;
            padding: 12px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 10px;
            outline: none;
            transition: all 0.15s ease;
            -webkit-appearance: none;
        }
        .select-input:focus {
            border-color: var(--accent-color);
        }
        .scanner-container {
            position: relative;
            width: 100%;
            height: 160px;
            background-color: #000;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #camera-view {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .target-ring {
            position: absolute;
            width: 65px;
            height: 65px;
            border: 3px dashed var(--accent-color);
            border-radius: 50%;
            pointer-events: none;
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.4);
        }
        .btn-primary {
            width: 100%;
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 14px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-primary:active {
            opacity: 0.8;
        }
        .result-box {
            text-align: center;
            padding: 22px 10px;
        }
        .nd-value {
            font-size: 58px;
            font-weight: 800;
            color: var(--text-color);
            line-height: 1;
            margin-bottom: 8px;
            letter-spacing: -1px;
        }
        .settings-suggested {
            font-size: 15px;
            color: var(--text-muted);
            font-weight: 500;
        }
        .settings-suggested strong {
            color: #34c759;
        }
        #lux-debug {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 8px;
            font-family: monospace;
        }
        canvas {
            display: none;
        }
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <header>
        <img src="logo.png" alt="Logo" class="brand-logo" onerror="this.style.display='none';">
        <div class="brand-title">Fleet ND Calc</div>
    </header>

    <!-- Selettore Modalità Principale -->
    <div class="card">
        <label>Metodo di Calcolo</label>
        <div class="segmented-control" id="mode-control">
            <button class="active" onclick="switchMode('manual', this)">Radiocomando</button>
            <button onclick="switchMode('camera', this)">Fotocamera Live</button>
        </div>
    </div>

    <!-- Selezione Drone -->
    <div class="card">
        <label>Drone in uso</label>
        <div class="segmented-control" id="drone-control">
            <button class="active" onclick="selectDrone('mavic4pro', this)">Mavic 4 Pro</button>
            <button onclick="selectDrone('air3s', this)">Air 3S</button>
            <button onclick="selectDrone('mavic3pro', this)">Mavic 3 Pro</button>
            <button onclick="selectDrone('mini5pro', this)">Mini 5 Pro</button>
        </div>
    </div>

    <!-- Selezione Obiettivo -->
    <div class="card">
        <label>Obiettivo / Ottica</label>
        <div class="segmented-control" id="lens-control"></div>
    </div>

    <!-- Selezione Frame Rate -->
    <div class="card">
        <label>Frame Rate desiderato</label>
        <div class="segmented-control" id="fps-control">
            <button class="active" onclick="setFps(25, this)">25 fps (1/50)</button>
            <button onclick="setFps(50, this)">50 fps (1/100)</button>
            <button onclick="setFps(60, this)">60 fps (1/120)</button>
        </div>
    </div>

    <!-- Interfaccia MODALITÀ MANUAL (Radiocomando) -->
    <div class="card" id="manual-ui">
        <div class="flex-row">
            <div class="flex-child">
                <label>Shutter attuale</label>
                <select class="select-input" id="shutter-select" onchange="calculateManualND()">
                    <option value="100">1/100 s</option>
                    <option value="160">1/160 s</option>
                    <option value="240">1/240 s</option>
                    <option value="320">1/320 s</option>
                    <option value="400">1/400 s</option>
                    <option value="500" selected>1/500 s</option>
                    <option value="640">1/640 s</option>
                    <option value="800">1/800 s</option>
                    <option value="1000">1/1000 s</option>
                    <option value="1250">1/1250 s</option>
                    <option value="1600">1/1600 s</option>
                    <option value="2000">1/2000 s</option>
                    <option value="2500">1/2500 s</option>
                    <option value="3200">1/3200 s</option>
                    <option value="4000">1/4000 s</option>
                    <option value="5000">1/5000 s</option>
                    <option value="6400">1/6400 s</option>
                    <option value="8000">1/8000 s</option>
                </select>
            </div>
            <div class="flex-child" id="aperture-select-container">
                <label>Diaframma attuale</label>
                <select class="select-input" id="aperture-select" onchange="calculateManualND()">
                    <option value="2.8" selected>f/2.8</option>
                    <option value="4.0">f/4.0</option>
                    <option value="5.6">f/5.6</option>
                    <option value="8.0">f/8.0</option>
                    <option value="11.0">f/11</option>
                </select>
            </div>
        </div>
    </div>

    <!-- Interfaccia MODALITÀ CAMERA -->
    <div class="card hidden" id="camera-ui">
        <label>Inquadra il cielo nel mirino</label>
        <div class="scanner-container">
            <video id="camera-view" autoplay playsinline muted></video>
            <div class="target-ring"></div>
        </div>
        <button class="btn-primary" id="scan-btn" onclick="analyzeLight()">
            ANALIZZA LUMINOSITÀ
        </button>
    </div>

    <!-- Output unico -->
    <div class="card result-box">
        <label>Filtro ND Richiesto</label>
        <div class="nd-value" id="nd-output">--</div>
        <div class="settings-suggested" id="settings-output">Scegli la configurazione.</div>
        <div id="lux-debug">Metodo: Radiocomando</div>
    </div>

    <canvas id="analyzer-canvas" width="100" height="100"></canvas>

    <script>
        const fleetDatabase = {
            mavic4pro: {
                name: "Mavic 4 Pro",
                lenses: [
                    { id: "main", label: "1x (28mm)", variable: true, minAperture: 2.8, maxAperture: 11.0, defaultAperture: 2.8 },
                    { id: "tele3x", label: "3x (70mm)", variable: false, aperture: 3.0 },
                    { id: "tele7x", label: "7x (166mm)", variable: false, aperture: 4.0 }
                ]
            },
            air3s: {
                name: "Air 3S",
                lenses: [
                    { id: "main", label: "1x (24mm)", variable: false, aperture: 1.8 },
                    { id: "tele3x", label: "3x (70mm)", variable: false, aperture: 2.8 }
                ]
            },
            mavic3pro: {
                name: "Mavic 3 Pro",
                lenses: [
                    { id: "hasselblad", label: "1x (24mm)", variable: true, minAperture: 2.8, maxAperture: 11.0, defaultAperture: 2.8 },
                    { id: "tele3x", label: "3x (70mm)", variable: false, aperture: 2.8 },
                    { id: "tele7x", label: "7x (166mm)", variable: false, aperture: 3.4 }
                ]
            },
            mini5pro: {
                name: "Mini 5 Pro",
                lenses: [
                    { id: "main", label: "1x (24mm)", variable: false, aperture: 1.8 }
                ]
            }
        };

        let currentMode = "manual";
        let currentDrone = "mavic4pro";
        let currentLensIndex = 0;
        let targetFps = 25;
        let targetShutter = 50; 
        let lastLuminance = null;
        let streamActive = null;

        let video = document.getElementById('camera-view');
        let canvas = document.getElementById('analyzer-canvas');
        let ctx = canvas.getContext('2d');

        function switchMode(mode, element) {
            currentMode = mode;
            document.querySelectorAll('#mode-control button').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');

            if (mode === 'manual') {
                document.getElementById('manual-ui').classList.remove('hidden');
                document.getElementById('camera-ui').classList.add('hidden');
                stopCamera();
                calculateManualND();
            } else {
                document.getElementById('manual-ui').classList.add('hidden');
                document.getElementById('camera-ui').classList.remove('hidden');
                initCamera();
                document.getElementById('nd-output').innerText = "--";
                document.getElementById('settings-output').innerText = "Inquadra e premi analizza.";
                document.getElementById('lux-debug').innerText = "Metodo: Fotocamera Live";
            }
        }

        async function initCamera() {
            if (streamActive) return;
            try {
                streamActive = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { exact: "environment" }, width: { ideal: 640 }, height: { ideal: 480 } },
                    audio: false
                });
                video.srcObject = streamActive;
            } catch (err) {
                try {
                    streamActive = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                    video.srcObject = streamActive;
                } catch (e) {
                    document.getElementById('settings-output').innerText = "Abilita la fotocamera nelle impostazioni.";
                }
            }
        }

        function stopCamera() {
            if (streamActive) {
                streamActive.getTracks().forEach(track => track.stop());
                streamActive = null;
                video.srcObject = null;
            }
        }

        function selectDrone(droneId, element) {
            currentDrone = droneId;
            currentLensIndex = 0;
            document.querySelectorAll('#drone-control button').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
            renderLensControl();
            updateApertureUI();
            updateCalculations();
        }

        function renderLensControl() {
            const container = document.getElementById('lens-control');
            container.innerHTML = "";
            const lenses = fleetDatabase[currentDrone].lenses;
            lenses.forEach((lens, index) => {
                const btn = document.createElement('button');
                btn.innerText = lens.label;
                if (index === currentLensIndex) btn.classList.add('active');
                btn.onclick = function() {
                    document.querySelectorAll('#lens-control button').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentLensIndex = index;
                    updateApertureUI();
                    updateCalculations();
                };
                container.appendChild(btn);
            });
        }

        function updateApertureUI() {
            const activeLens = fleetDatabase[currentDrone].lenses[currentLensIndex];
            const container = document.getElementById('aperture-select-container');
            const select = document.getElementById('aperture-select');
            
            if (activeLens.variable) {
                container.classList.remove('hidden');
            } else {
                container.classList.add('hidden');
            }
        }

        function setFps(fps, element) {
            targetFps = fps;
            targetShutter = fps * 2;
            document.querySelectorAll('#fps-control button').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
            updateCalculations();
        }

        function updateCalculations() {
            if (currentMode === 'manual') {
                calculateManualND();
            } else if (lastLuminance !== null) {
                calculateCameraND(lastLuminance);
            }
        }

        function calculateManualND() {
            const currentShutter = parseFloat(document.getElementById('shutter-select').value);
            const activeLens = fleetDatabase[currentDrone].lenses[currentLensIndex];
            
            let currentAperture = activeLens.variable ? parseFloat(document.getElementById('aperture-select').value) : activeLens.aperture;
            let targetAperture = activeLens.variable ? activeLens.defaultAperture : activeLens.aperture; 

            // Formula completa: unisce la differenza di Shutter e la differenza di Diaframma in stop legali
            let shutterStops = Math.log2(currentShutter / targetShutter);
            let apertureStops = Math.log2(Math.pow(currentAperture / targetAperture, 2));
            let stopDifference = shutterStops + apertureStops;
            
            let ndFilter = "NESSUNO";
            let apertureText = activeLens.variable ? "f/" + targetAperture.toFixed(1) : "f/" + activeLens.aperture.toFixed(1) + " (Fisso)";

            if (stopDifference > 0) {
                if (stopDifference <= 1.5) ndFilter = "ND4";
                else if (stopDifference > 1.5 && stopDifference <= 2.5) ndFilter = "ND8";
                else if (stopDifference > 2.5 && stopDifference <= 3.5) ndFilter = "ND16";
                else if (stopDifference > 3.5 && stopDifference <= 4.5) ndFilter = "ND32";
                else if (stopDifference > 4.5 && stopDifference <= 5.5) ndFilter = "ND64";
                else if (stopDifference > 5.5 && stopDifference <= 6.8) ndFilter = "ND128";
                else ndFilter = "ND256";

                // Gestione della compensazione con chiusura del diaframma se la luce è troppa
                if (activeLens.variable) {
                    if (ndFilter === "ND8" && stopDifference > 2.2) apertureText = "f/4.0";
                    if (ndFilter === "ND16" && stopDifference > 3.2) apertureText = "f/4.0";
                    if (ndFilter === "ND64" && stopDifference > 5.2) apertureText = "f/4.5";
                }
            }

            document.getElementById('nd-output').innerText = ndFilter;
            if (ndFilter === "NESSUNO") {
                document.getElementById('settings-output').innerHTML = "Luce ottimale. Imposta la camera a <strong>" + apertureText + "</strong>.";
            } else {
                document.getElementById('settings-output').innerHTML = "Monta <strong>" + ndFilter + "</strong> e riporta la camera a <strong>" + apertureText + "</strong>";
            }
            document.getElementById('lux-debug').innerText = "Target: 1/" + targetShutter + "s | Stop totali da tagliare: ~" + stopDifference.toFixed(1);
        }

        function analyzeLight() {
            if (!video.srcObject) return;
            const sourceX = (video.videoWidth - 60) / 2;
            const sourceY = (video.videoHeight - 60) / 2;
            ctx.drawImage(video, sourceX, sourceY, 60, 60, 0, 0, 100, 100);
            const imgData = ctx.getImageData(0, 0, 100, 100).data;
            let totalLuminance = 0;
            for (let i = 0; i < imgData.length; i += 4) {
                totalLuminance += (0.2126 * imgData[i] + 0.7152 * imgData[i+1] + 0.0722 * imgData[i+2]);
            }
            lastLuminance = totalLuminance / (imgData.length / 4);
            calculateCameraND(lastLuminance);
        }

        function calculateCameraND(luminance) {
            let ev = 11; 
            if (luminance > 225) ev = 16.5; 
            else if (luminance > 210) ev = 16;
            else if (luminance > 175) ev = 15; 
            else if (luminance > 140) ev = 14; 
            else if (luminance > 100) ev = 13; 
            else ev = 11.5; 

            const activeLens = fleetDatabase[currentDrone].lenses[currentLensIndex];
            let apertureUsed = activeLens.variable ? activeLens.defaultAperture : activeLens.aperture;
            let apertureText = activeLens.variable ? "f/" + apertureUsed.toFixed(1) : "f/" + apertureUsed.toFixed(1) + " (Fisso)";

            let idealShutter = Math.pow(apertureUsed, 2) / Math.pow(2, ev - 0.5);
            let idealDenominator = 1 / idealShutter;
            let stopDifference = Math.log2(idealDenominator / targetShutter);
            let ndFilter = "NESSUNO";

            if (stopDifference > 0) {
                if (stopDifference <= 1.5) ndFilter = "ND4";
                else if (stopDifference > 1.5 && stopDifference <= 2.5) ndFilter = "ND8";
                else if (stopDifference > 2.5 && stopDifference <= 3.5) ndFilter = "ND16";
                else if (stopDifference > 3.5 && stopDifference <= 4.5) ndFilter = "ND32";
                else if (stopDifference > 4.5 && stopDifference <= 5.5) ndFilter = "ND64";
                else if (stopDifference > 5.5 && stopDifference <= 6.8) ndFilter = "ND128";
                else ndFilter = "ND256";

                if (activeLens.variable) {
                    if (ndFilter === "ND8" && stopDifference > 2.2) apertureText = "f/4.0";
                    if (ndFilter === "ND16" && stopDifference > 3.2) apertureText = "f/4.0";
                    if (ndFilter === "ND64" && stopDifference > 5.2) apertureText = "f/4.5";
                }
            }

            document.getElementById('nd-output').innerText = ndFilter;
            if (ndFilter === "NESSUNO") {
                document.getElementById('settings-output').innerHTML = "Luce gestibile. Chiudi a <strong>" + apertureText + "</strong> senza filtri.";
            } else {
                document.getElementById('settings-output').innerHTML = "Monta <strong>" + ndFilter + "</strong> e imposta la camera a <strong>" + apertureText + "</strong>";
            }
            document.getElementById('lux-debug').innerText = "EV stimato: " + ev + " | Target Shutter: 1/" + targetShutter + "s";
        }

        window.addEventListener('DOMContentLoaded', () => {
            renderLensControl();
            updateApertureUI();
            calculateManualND();
        });
    </script>
</body>
</html>
